<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>! Bang Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #07090d;
      --surface:   #0c1018;
      --surface2:  #111822;
      --border:    #1a2535;
      --border2:   #233045;
      --accent:    #4af0c0;
      --accent-dim:#1a6b52;
      --amber:     #f0b429;
      --amber-dim: #5a4210;
      --text:      #d4e2ed;
      --text-sub:  #6b8499;
      --text-dim:  #3a5060;
      --red:       #ff5f6d;

      --cat-ai:          #a78bfa;
      --cat-tech:        #38bdf8;
      --cat-research:    #34d399;
      --cat-news:        #fb923c;
      --cat-entertainment:#f472b6;
      --cat-shopping:    #facc15;
      --cat-multimedia:  #c084fc;
      --cat-online:      #67e8f9;
      --cat-translation: #86efac;
      --cat-other:       #94a3b8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Instrument Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ─── HEADER ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      height: 56px;
    }

    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.5px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .logo span { color: var(--text-sub); font-weight: 400; }

    .search-wrap {
      flex: 1;
      max-width: 480px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
    }

    #search {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Instrument Sans', sans-serif;
      font-size: 14px;
      padding: 8px 12px 8px 36px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    #search::placeholder { color: var(--text-dim); }

    #search:focus {
      border-color: var(--accent-dim);
      box-shadow: 0 0 0 3px rgba(74, 240, 192, 0.08);
    }

    .stats {
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-sub);
      white-space: nowrap;
      flex-shrink: 0;
    }

    #count-display { color: var(--accent); font-weight: 600; }

    /* ─── CATEGORIES ─── */
    .cat-bar {
      padding: 12px 24px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .cat-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text-sub);
      font-family: 'Instrument Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }

    .cat-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .cat-btn.active {
      color: #000;
      border-color: transparent;
      font-weight: 600;
    }

    .cat-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      opacity: 0.75;
    }

    /* ─── SORT BAR ─── */
    .sort-bar {
      display: grid;
      grid-template-columns: 90px 1fr 180px 120px 100px 80px;
      gap: 0;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 56px;
      z-index: 90;
    }

    .sort-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 10px 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.12s;
      white-space: nowrap;
    }

    .sort-btn:hover { color: var(--text); }
    .sort-btn.active { color: var(--accent); }

    .sort-icon { font-size: 10px; opacity: 0.7; }

    /* ─── TABLE ─── */
    #table-body {
      display: block;
    }

    .row {
      display: grid;
      grid-template-columns: 90px 1fr 180px 120px 100px 80px;
      gap: 0;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      transition: background 0.08s;
      text-decoration: none;
      color: inherit;
      align-items: center;
      min-height: 44px;
    }

    .row:hover {
      background: var(--surface2);
      cursor: pointer;
    }

    .row:hover .trigger { color: #fff; }

    .cell {
      padding: 10px 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .trigger {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(74, 240, 192, 0.06);
      border-radius: 4px;
      padding: 3px 7px;
      display: inline-block;
      border: 1px solid rgba(74, 240, 192, 0.12);
      transition: all 0.1s;
    }

    .row:hover .trigger {
      background: rgba(74, 240, 192, 0.14);
      border-color: rgba(74, 240, 192, 0.3);
    }

    .site-name { font-weight: 500; }

    .domain {
      color: var(--text-sub);
      font-size: 12px;
    }

    .subcat {
      color: var(--text-sub);
      font-size: 12px;
    }

    .rank {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
      text-align: right;
    }

    .rank.high { color: var(--amber); }
    .rank.mid  { color: var(--text-sub); }

    .cat-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(255,255,255,0.06);
    }

    /* ─── PAGINATION ─── */
    .pager {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 20px 24px;
      border-top: 1px solid var(--border);
    }

    .page-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text-sub);
      font-family: 'Instrument Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.12s;
    }

    .page-btn:hover:not(:disabled) { color: var(--text); border-color: var(--border2); background: var(--surface); }
    .page-btn:disabled { opacity: 0.3; cursor: default; }
    .page-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 600; }

    .page-info {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-sub);
      padding: 0 8px;
    }

    /* ─── EMPTY / LOADING ─── */
    .state-msg {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-sub);
      font-size: 15px;
    }

    .state-msg code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 5px;
      padding: 2px 8px;
      color: var(--amber);
    }

    .state-msg p { margin-top: 10px; }

    .loading-dots span {
      display: inline-block;
      animation: blink 1.2s infinite;
      color: var(--accent);
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.15; }
      40%           { opacity: 1; }
    }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
  </style>
</head>
<body>

<header>
  <div class="logo">!<span> bang</span> browser</div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="text" placeholder="Search by trigger, name, or domain…" autocomplete="off" spellcheck="false">
  </div>
  <div class="stats"><span id="count-display">—</span> results</div>
</header>

<div class="cat-bar" id="cat-bar"></div>

<div class="sort-bar">
  <button class="sort-btn" data-col="t">!bang <span class="sort-icon">↕</span></button>
  <button class="sort-btn" data-col="s">Name <span class="sort-icon">↕</span></button>
  <button class="sort-btn" data-col="d">Domain <span class="sort-icon">↕</span></button>
  <button class="sort-btn" data-col="sc">Subcategory <span class="sort-icon">↕</span></button>
  <button class="sort-btn" data-col="c">Category <span class="sort-icon">↕</span></button>
  <button class="sort-btn active" data-col="r">Rank <span class="sort-icon">↓</span></button>
</div>

<div id="table-body">
  <div class="state-msg">
    <div class="loading-dots"><span>●</span><span>●</span><span>●</span></div>
    <p>Loading bangs…</p>
  </div>
</div>

<div class="pager" id="pager" style="display:none"></div>

<script>
  const PAGE_SIZE = 100;

  const CAT_COLORS = {
    'AI':             '#a78bfa',
    'Tech':           '#38bdf8',
    'Research':       '#34d399',
    'News':           '#fb923c',
    'Entertainment':  '#f472b6',
    'Shopping':       '#facc15',
    'Multimedia':     '#c084fc',
    'Online Services':'#67e8f9',
    'Translation':    '#86efac',
    'Uncategorized':  '#94a3b8',
  };

  function catColor(c) { return CAT_COLORS[c] || '#94a3b8'; }

  let allBangs = [];
  let filtered = [];
  let currentCat = 'All';
  let currentSort = { col: 'r', dir: -1 };
  let currentPage = 1;
  let query = '';

  // ─── LOAD ───
  fetch('./all-bangs.json')
    .then(r => {
      if (!r.ok) throw new Error(r.statusText);
      return r.json();
    })
    .then(data => {
      allBangs = [];
      for (const [cat, items] of Object.entries(data)) {
        for (const b of items) {
          allBangs.push({ ...b, c: b.c ?? cat });
        }
      }
      buildCategoryBar(data);
      applyFilters();
    })
    .catch(err => {
      document.getElementById('table-body').innerHTML = `
        <div class="state-msg">
          <div style="font-size:28px;margin-bottom:16px">⚠️</div>
          <strong style="color:var(--red)">Could not load all-bangs.json</strong>
          <p>Browsers block <code>fetch()</code> on <code>file://</code> URLs.<br>
          Run a local server from this directory:</p>
          <p style="margin-top:16px"><code>python3 -m http.server 8080</code></p>
          <p style="margin-top:8px;font-size:12px;color:var(--text-dim)">Then open <code>http://localhost:8080/browse.html</code></p>
          <p style="margin-top:16px;font-size:11px;color:var(--text-dim)">${err.message}</p>
        </div>`;
    });

  // ─── CATEGORY BAR ───
  function buildCategoryBar(data) {
    const bar = document.getElementById('cat-bar');
    const cats = ['All', ...Object.keys(data).sort()];
    const counts = { All: allBangs.length };
    for (const [cat, items] of Object.entries(data)) counts[cat] = items.length;

    bar.innerHTML = cats.map(cat => `
      <button class="cat-btn${cat === 'All' ? ' active' : ''}"
              data-cat="${cat}"
              style="${cat !== 'All' ? `--cc:${catColor(cat)}` : ''}">
        ${cat}
        <span class="cat-badge">${(counts[cat] ?? 0).toLocaleString()}</span>
      </button>
    `).join('');

    bar.querySelectorAll('.cat-btn').forEach(btn => {
      const cc = btn.style.getPropertyValue('--cc');
      if (cc) {
        btn.addEventListener('mouseover', () => { btn.style.color = cc; });
        btn.addEventListener('mouseout', () => {
          if (!btn.classList.contains('active')) btn.style.color = '';
        });
      }
      btn.addEventListener('click', () => {
        currentCat = btn.dataset.cat;
        currentPage = 1;
        bar.querySelectorAll('.cat-btn').forEach(b => {
          b.classList.remove('active');
          b.style.background = '';
          b.style.color = '';
        });
        btn.classList.add('active');
        if (cc) {
          btn.style.background = cc;
          btn.style.color = '#000';
        } else {
          btn.style.background = 'var(--accent)';
          btn.style.color = '#000';
        }
        applyFilters();
      });
    });
  }

  // ─── SEARCH ───
  document.getElementById('search').addEventListener('input', e => {
    query = e.target.value.trim().toLowerCase();
    currentPage = 1;
    applyFilters();
  });

  // ─── SORT ───
  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const col = btn.dataset.col;
      if (currentSort.col === col) {
        currentSort.dir *= -1;
      } else {
        currentSort.col = col;
        currentSort.dir = col === 'r' ? -1 : 1;
      }
      currentPage = 1;
      updateSortUI();
      applyFilters();
    });
  });

  function updateSortUI() {
    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.classList.remove('active');
      btn.querySelector('.sort-icon').textContent = '↕';
    });
    const active = document.querySelector(`.sort-btn[data-col="${currentSort.col}"]`);
    if (active) {
      active.classList.add('active');
      active.querySelector('.sort-icon').textContent = currentSort.dir === 1 ? '↑' : '↓';
    }
  }

  // ─── FILTER + SORT ───
  function applyFilters() {
    filtered = allBangs.filter(b => {
      if (currentCat !== 'All' && b.c !== currentCat) return false;
      if (!query) return true;
      return (b.t && b.t.toLowerCase().includes(query))
          || (b.s && b.s.toLowerCase().includes(query))
          || (b.d && b.d.toLowerCase().includes(query));
    });

    const { col, dir } = currentSort;
    filtered.sort((a, b) => {
      let av = a[col] ?? '', bv = b[col] ?? '';
      if (col === 'r') { av = av || 0; bv = bv || 0; return (av - bv) * dir; }
      return String(av).localeCompare(String(bv)) * dir;
    });

    document.getElementById('count-display').textContent = filtered.length.toLocaleString();
    renderPage();
  }

  // ─── RENDER ───
  function renderPage() {
    const total = filtered.length;
    const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if (currentPage > totalPages) currentPage = totalPages;

    const start = (currentPage - 1) * PAGE_SIZE;
    const slice = filtered.slice(start, start + PAGE_SIZE);

    const body = document.getElementById('table-body');

    if (slice.length === 0) {
      body.innerHTML = `<div class="state-msg">No bangs match your search.</div>`;
      document.getElementById('pager').style.display = 'none';
      return;
    }

    body.innerHTML = slice.map(b => {
      const rank = b.r || 0;
      const rankClass = rank > 10000 ? 'high' : rank > 500 ? 'mid' : '';
      const cc = catColor(b.c);
      const url = b.u ? b.u.replace('{{{s}}}', '') : '#';
      return `<a class="row" href="${escHref(url)}" target="_blank" rel="noopener" title="Open ${escAttr(b.s)} (URL template: ${escAttr(b.u ?? '')})">
        <div class="cell"><span class="trigger">!${esc(b.t)}</span></div>
        <div class="cell site-name">${esc(b.s)}</div>
        <div class="cell domain">${esc(b.d)}</div>
        <div class="cell subcat">${esc(b.sc ?? '—')}</div>
        <div class="cell"><span class="cat-pill" style="color:${cc};background:${cc}18">${esc(b.c ?? '?')}</span></div>
        <div class="cell rank ${rankClass}">${rank ? rank.toLocaleString() : '—'}</div>
      </a>`;
    }).join('');

    renderPager(totalPages);
  }

  function renderPager(totalPages) {
    const pager = document.getElementById('pager');
    if (totalPages <= 1) { pager.style.display = 'none'; return; }
    pager.style.display = 'flex';

    const p = currentPage;
    let pages = new Set([1, totalPages, p, p - 1, p + 1, p - 2, p + 2]
      .filter(x => x >= 1 && x <= totalPages));
    pages = [...pages].sort((a, b) => a - b);

    let html = `<button class="page-btn" id="prev-btn" ${p === 1 ? 'disabled' : ''}>← Prev</button>`;
    let prev = 0;
    for (const pg of pages) {
      if (prev && pg - prev > 1) html += `<span class="page-info">…</span>`;
      html += `<button class="page-btn${pg === p ? ' active' : ''}" data-pg="${pg}">${pg}</button>`;
      prev = pg;
    }
    html += `<button class="page-btn" id="next-btn" ${p === totalPages ? 'disabled' : ''}>Next →</button>`;
    html += `<span class="page-info">${((p-1)*PAGE_SIZE+1).toLocaleString()}–${Math.min(p*PAGE_SIZE, filtered.length).toLocaleString()} of ${filtered.length.toLocaleString()}</span>`;

    pager.innerHTML = html;

    pager.querySelector('#prev-btn')?.addEventListener('click', () => { currentPage--; scrollToTop(); renderPage(); });
    pager.querySelector('#next-btn')?.addEventListener('click', () => { currentPage++; scrollToTop(); renderPage(); });
    pager.querySelectorAll('[data-pg]').forEach(btn => {
      btn.addEventListener('click', () => { currentPage = +btn.dataset.pg; scrollToTop(); renderPage(); });
    });
  }

  function scrollToTop() { window.scrollTo({ top: 100, behavior: 'smooth' }); }

  // ─── UTILS ───
  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function escAttr(s) {
    return String(s ?? '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function escHref(s) {
    try { new URL(s); return escAttr(s); } catch { return '#'; }
  }
</script>
</body>
</html>
